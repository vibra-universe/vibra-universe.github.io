<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>La Théorie de la conscience</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="module" src="https://cdn.jsdelivr.net/npm/zero-md@3?register"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background-color: #001500;
        }
    </style>
</head>
<body>

    <zero-md src="conscience.md">
        <template>
            <style>
                .markdown-body {
                    background-color: #001500 !important;
                    color: #e0e0e0;
                    padding: 20px;
                    /* --- MODIFICATION ICI --- */
                    /* On applique Arial par défaut à tout le document */
                    font-family: Arial, Helvetica, sans-serif !important;
                }

                .markdown-body pre {
                    overflow-x: auto !important;
                    word-wrap: normal !important;
                    white-space: pre !important;
                }

                /* --- AJOUT ICI --- */
                /* On force les blocs de code et le code en ligne à garder leur police spéciale */
                .markdown-body code, 
                .markdown-body pre, 
                .markdown-body kbd, 
                .markdown-body samp {
                    font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace !important; background-color: #002500; border-radius: 5px;
                }
            </style>
        </template>
    </zero-md>

</body>
</html>
